<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đào Quang Lâm - Bio Link</title>
    <!-- Sử dụng Tailwind CSS qua CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome để hiển thị icon Facebook -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 1. Nền tối có chiều sâu */
        body {
            background: linear-gradient(135deg, #090d16 0%, #110e2e 50%, #090714 100%);
            overflow: hidden; /* Giữ các hạt không bị tràn màn hình gây ra thanh cuộn */
        }

        /* 2. Hiệu ứng quét sáng (Shine) trên các nút bấm */
        .btn-shine {
            position: relative;
            overflow: hidden;
        }
        .btn-shine::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 30%;
            height: 200%;
            background: rgba(255, 255, 255, 0.13);
            transform: rotate(30deg);
            animation: shine 4s ease-in-out infinite;
        }
        @keyframes shine {
            0% { left: -60%; }
            15% { left: 140%; }
            100% { left: 140%; }
        }

        /* 3. Hiệu ứng xoay nhẹ viền Avatar */
        @keyframes spin-slow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 8s linear infinite;
        }

        /* 4. CSS cho các hạt bay phía sau */
        .particle {
            position: absolute;
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 70%);
            pointer-events: none; /* Không cản trở việc bấm nút */
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(105vh) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-5vh) scale(1.2);
                opacity: 0;
            }
        }
    </style>
</head>
<body class="text-gray-200 min-h-screen flex flex-col items-center justify-center p-5 select-none relative">

    <!-- Lớp chứa các hạt chuyển động (nằm dưới khung Bio) -->
    <div id="particle-container" class="absolute inset-0 pointer-events-none z-0"></div>

    <!-- Khung Bio chính -->
    <div class="w-full max-w-md bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-6 shadow-2xl text-center relative z-10 transform transition-all duration-500 hover:scale-[1.01]">
        
        <!-- Ảnh đại diện (Avatar) với viền động -->
        <div class="relative w-24 h-24 mx-auto mb-4 group">
            <div class="absolute inset-0 bg-gradient-to-tr from-blue-500 via-teal-400 to-purple-500 rounded-full animate-spin-slow blur-[2px]"></div>
            <div class="absolute inset-[3px] bg-slate-900 rounded-full"></div>
            <img src="avatar.jpg" alt="Avatar" class="absolute inset-[4px] w-[calc(100%-8px)] h-[calc(100%-8px)] object-cover rounded-full transition-transform duration-500 group-hover:scale-105">
        </div>

        <!-- Tên và Mô tả ngắn -->
        <h1 class="text-2xl font-extrabold tracking-wide text-white mb-1.5 bg-clip-text text-transparent bg-gradient-to-r from-white via-gray-200 to-gray-400">
            Đào Quang Lâm
        </h1>
        <p class="text-xs text-gray-400 font-medium tracking-wider uppercase mb-6 flex items-center justify-center gap-1.5">
            <span>Thông tin liên kết</span> 
            <span class="inline-block animate-pulse text-teal-400">✨</span>
        </p>

        <!-- Danh sách các nút liên kết -->
        <div class="space-y-4">
            
            <!-- Nút Facebook -->
            <a href="https://www.facebook.com/share/1PyVKytfM4/" target="_blank" 
               class="btn-shine flex items-center justify-between w-full px-5 py-4 bg-[#1877F2]/10 hover:bg-[#1877F2]/20 border border-[#1877F2]/20 hover:border-[#1877F2]/80 rounded-2xl transition-all duration-300 group shadow-lg shadow-black/10">
                <div class="flex items-center space-x-3.5">
                    <div class="w-9 h-9 flex items-center justify-center bg-[#1877F2]/20 rounded-xl group-hover:scale-110 transition-transform">
                        <i class="fab fa-facebook text-[#1877F2] text-xl"></i>
                    </div>
                    <span class="font-semibold text-sm tracking-wide text-gray-300 group-hover:text-white transition-colors">Facebook</span>
                </div>
                <i class="fas fa-chevron-right text-gray-600 text-xs group-hover:translate-x-1 group-hover:text-white transition-all"></i>
            </a>

            <!-- Nút Zalo -->
            <a href="https://zalo.me/0879105860" target="_blank" 
               class="btn-shine flex items-center justify-between w-full px-5 py-4 bg-[#0068FF]/10 hover:bg-[#0068FF]/20 border border-[#0068FF]/20 hover:border-[#0068FF]/80 rounded-2xl transition-all duration-300 group shadow-lg shadow-black/10">
                <div class="flex items-center space-x-3.5">
                    <div class="w-9 h-9 flex items-center justify-center bg-[#0068FF]/20 rounded-xl group-hover:scale-110 transition-transform p-1.5">
                        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
                            <path d="M24 4C12.95 4 4 11.83 4 21.5C4 26.63 6.47 31.25 10.42 34.41C9.64 37.77 8.12 41.25 8.04 41.43C7.94 41.67 8.01 41.93 8.21 42.08C8.34 42.18 8.5 42.22 8.65 42.22C8.75 42.22 8.86 42.19 8.96 42.14C9.13 42.06 14.73 39.11 18.73 36.88C20.42 37.47 22.18 37.79 24 37.79C35.05 37.79 44 29.96 44 20.29C44 11.3 35.05 4 24 4ZM34.56 26.59C34.25 27.23 33.15 27.75 31.96 27.75C31.51 27.75 30.07 27.56 27.39 26.12C23.77 24.17 21.43 21.05 20.08 19.14C19.78 18.72 17.51 15.48 17.51 12.87C17.51 10.57 18.78 9.43 19.46 8.89C19.92 8.53 20.6 8.44 21.1 8.44L22.56 8.46C22.95 8.47 23.29 8.68 23.46 9.04L25.17 12.84C25.32 13.18 25.23 13.58 24.96 13.82L24.03 14.65C23.71 14.93 23.63 15.38 23.84 15.75C24.31 16.59 25.4 18.25 26.77 19.56C28.24 20.97 29.62 21.68 30.34 22.02C30.73 22.21 31.19 22.1 31.46 21.78L32.25 20.84C32.52 20.52 32.96 20.4 33.35 20.55L37.38 22.08C37.78 22.23 38.04 22.61 38.04 23.04L37.95 24.52C37.91 25.38 36.03 26.31 34.56 26.59Z" fill="#0068FF"/>
                        </svg>
                    </div>
                    <span class="font-semibold text-sm tracking-wide text-gray-300 group-hover:text-white transition-colors">Zalo</span>
                </div>
                <i class="fas fa-chevron-right text-gray-600 text-xs group-hover:translate-x-1 group-hover:text-white transition-all"></i>
            </a>

        </div>

        <!-- Footer -->
        <div class="mt-8 text-[10px] text-gray-500 tracking-widest uppercase">
            © 2026 Code by D.Nghĩa
        </div>

    </div>

    <!-- 5. Script tự động tạo hạt chuyển động -->
    <script>
        const container = document.getElementById('particle-container');
        const particleCount = 25; // Số lượng đốm sáng trên màn hình cùng lúc

        // Hàm chọn ngẫu nhiên màu cho hạt (xanh lá nhạt, tím nhạt, hoặc trắng xanh)
        const colors = [
            'rgba(45, 212, 191, 0.3)',  /* Teal */
            'rgba(147, 51, 234, 0.25)', /* Purple */
            'rgba(59, 130, 246, 0.25)', /* Blue */
            'rgba(255, 255, 255, 0.2)'  /* White */
        ];

        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            // Kích thước ngẫu nhiên từ 15px đến 50px
            const size = Math.random() * 35 + 15;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            
            // Vị trí xuất phát ngẫu nhiên theo chiều ngang (0% -> 100%)
            particle.style.left = `${Math.random() * 100}%`;
            
            // Thời gian bay ngẫu nhiên từ 8 giây đến 18 giây
            const duration = Math.random() * 10 + 8;
            particle.style.animationDuration = `${duration}s`;
            
            // Chọn màu ngẫu nhiên cho hạt
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            particle.style.background = `radial-gradient(circle, ${randomColor} 0%, rgba(255,255,255,0) 70%)`;
            
            container.appendChild(particle);

            // Tự động xóa hạt sau khi bay hết màn hình để tránh quá tải bộ nhớ
            setTimeout(() => {
                particle.remove();
            }, duration * 1000);
        }

        // Tạo trước một số hạt để khi mở trang lên là có sẵn luôn
        for(let i = 0; i < particleCount; i++) {
            setTimeout(() => {
                createParticle();
                // Cho các hạt đầu tiên xuất phát ở các độ cao khác nhau thay vì từ đáy lên
                const lastParticle = container.lastChild;
                if (lastParticle && lastParticle.style) {
                    lastParticle.style.animationDelay = `-${Math.random() * 15}s`;
                }
            }, i * 200);
        }

        // Liên tục tạo thêm hạt mới sau mỗi khoảng thời gian ngắn
        setInterval(() => {
            if (container.children.length < particleCount) {
                createParticle();
            }
        }, 600);
    </script>

</body>
</html>
